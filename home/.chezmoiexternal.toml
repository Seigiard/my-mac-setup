# External sources synced by chezmoi
# Run `chezmoi apply` to sync, `chezmoi update` to refresh
# Using archive type with include to extract only specific subdirectories

[".claude/skills/linear-cli"]
type = "archive"
url = "https://github.com/schpet/linear-cli/archive/refs/heads/main.tar.gz"
include = ["*/skills/linear-cli/**"]
stripComponents = 3
refreshPeriod = "168h"

[".claude/skills/improve-claude-md"]
type = "archive"
url = "https://github.com/dexhorthy/slopfiles/archive/refs/heads/main.tar.gz"
include = ["*/plugins/improve-claude-md/skills/improve-claude-md/**"]
stripComponents = 5
refreshPeriod = "168h"
