# Alacritty/Ghostty + tmux
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Для JavaScript разработки
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Изменить префикс на Ctrl+a
# set -g prefix C-a
# unbind C-b

# Включить мышь
set -g mouse on

# Нумерация окон и панелей с 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Без лага при нажатии Escape (критично для neovim — выход из insert mode)
set -sg escape-time 0

# Большой скроллбэк (дефолт всего 2000)
set -g history-limit 100000

# ─── Flexoki Light theme (inline) ─────────────
set -g pane-border-style "fg=#dad8ce"
set -g pane-active-border-style "fg=#4385be"
set -g pane-border-lines heavy
set -g message-style "fg=#100f0f,bg=#f2f0e5"
setw -g mode-style "fg=#da702c,bg=#100f0f,bold"
setw -g clock-mode-colour "#4385be"

set -g status-position top
set -g status on
set -g status-bg "#f2f0e5"
set -g status-justify left
set -g status-left-length 40
set -g status-right ""
setw -g window-status-separator ""

set -g status-left "#{?client_prefix,#[fg=#fffcf0 bg=#d14d41 bold] PREFIX #[default] ,#[fg=#6f6e69] }#S #{?window_zoomed_flag,#[fg=#fffcf0 bg=#4385be bold] ZOOM #[default] ,}"
setw -g window-status-format "#[fg=#878580 bg=#f2f0e5] #I #W "
setw -g window-status-current-format "#[fg=#100f0f bg=#fffcf0 bold] #I #W "

# Правильная прокрутка для macOS
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# OSC 52 клипборд — портабельная запись в системный буфер
# (работает локально, по SSH, в контейнерах — через escape-последовательность)
set -g set-clipboard on
set -g allow-passthrough on
set -as terminal-features ',xterm*:clipboard'

# Копирование в системный буфер macOS (дополнительно к OSC 52)
setw -g mode-keys vi
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ─── Splits ────────────────────────────────────
bind d split-window -h -c "#{pane_current_path}"
bind D split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── Pane navigation ───────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# ─── Windows ───────────────────────────────────
bind t new-window -c "#{pane_current_path}"
bind S-Left previous-window
bind S-Right next-window

# ─── Alt-1..9 — прыжки по окнам без префикса
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# ─── Alt-k — очистка экрана + скроллбэка в шелле, Ctrl-L в программах
# Если в панели запущено что-то кроме шелла/grep/awk/etc — шлём Ctrl-L
# (neovim, less, dev-серверы сами перерисуются, скроллбэк не трогаем)
# Если только шелл — полный reset + clear-history (как Cmd-k в iTerm/Ghostty)
is_program="ps -o comm= -t '#{pane_tty}' | grep -vE '^-?(fish|bash|zsh|sh|ps|grep|awk|sed|cut|sort|uniq|head|cat|echo|printf)$' | grep -q ."
bind -n M-k if-shell "$is_program" "send-keys C-l" "send-keys -R; clear-history"

# ─── Close / Zoom ──────────────────────────────
bind w kill-pane
bind f resize-pane -Z

# ─── Pane resize ────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Layouts ────────────────────────────────────
bind Space next-layout

# ─── Swap panes ─────────────────────────────────
bind . swap-pane -D
bind , swap-pane -U

# ─── Fuzzy search (fzf popups) ─────────────────
bind C-e display-popup -w 40 -h 15 -E "~/.tmux/fzf-sessions.sh"
bind C-f display-popup -w 40 -h 15 -E "~/.tmux/fzf-windows.sh"

# ─── Plugins (TPM) ─────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'jaclu/tmux-menus'

set -g @continuum-restore 'off'

run '~/.tmux/plugins/tpm/tpm'
