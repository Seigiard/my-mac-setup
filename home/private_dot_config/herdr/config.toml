onboarding = false

[theme]
name = "rose-pine-dawn"

[theme.custom]
panel_bg = "reset"

[experimental]
kitty_graphics = true

[keys]
switch_workspace = "ctrl+shift+1..9"
split_horizontal = "prefix+minus"
split_vertical = "prefix+v"
close_pane = ""

[[keys.command]]
key = "cmd+shift+p"
type = "plugin_action"
command = "seigi.command-palette.open"
description = "command palette"

[[keys.command]]
key = "prefix+space"
type = "plugin_action"
command = "seigi.command-palette.open"
description = "command palette"

[[keys.command]]
key = "prefix+x"
type = "plugin_action"
command = "seigi.command-palette.smart_close"
description = "close pane, then tab, but keep workspace"

[ui]
prompt_new_tab_name = false
