[[commands]]
group = "Panes"
title = "Split pane right"
description = "Split the active pane to the right"
type = "herdr"
args = ["pane", "split", "{target_pane}", "--direction", "right", "--focus"]

[[commands]]
group = "Panes"
title = "Split pane down"
description = "Split the active pane downward"
type = "herdr"
args = ["pane", "split", "{target_pane}", "--direction", "down", "--focus"]

[[commands]]
group = "Panes"
title = "Close active pane"
description = "Close the pane that opened the palette"
type = "herdr"
args = ["pane", "close", "{target_pane}"]

[[commands]]
group = "Git"
title = "Lazygit in new tab"
description = "Open a new tab in the current pane's directory and run lazygit"
type = "tab_run"
label = "lazygit"
command = "lazygit"

[[commands]]
group = "Git"
title = "Lazygit in overlay"
description = "Replace the palette overlay with lazygit in the current pane's directory"
type = "overlay_shell"
command = "lazygit"

[[commands]]
group = "Git"
title = "Update main branch"
description = "Run gpmain in the current pane's directory"
type = "shell"
command = "zsh -ic 'gpmain'"

[[commands]]
group = "Git"
title = "Merge main branch"
description = "Run gmmain in the current pane's directory"
type = "shell"
command = "zsh -ic 'gmmain'"

[[commands]]
group = "Herdr"
title = "New tab"
description = "Create and focus a new tab in the active workspace"
type = "herdr"
args = ["tab", "create", "--focus"]

[[commands]]
group = "Herdr"
title = "Switch workspace"
description = "Choose and focus a workspace"
type = "workspace_picker"

[[commands]]
group = "Herdr"
title = "Reload config"
description = "Apply config.toml changes without restarting panes"
type = "herdr"
args = ["server", "reload-config"]

[[commands]]
group = "Settings"
title = "Edit command palette config"
description = "Open commands.toml in the original pane with $EDITOR"
type = "pane_run"
command = "${EDITOR:-vi} {config_file_q}"
